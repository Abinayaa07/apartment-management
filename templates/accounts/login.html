{% extends "base/auth_base.html" %}

{% block title %}Login{% endblock %}
{% block heading %}Login{% endblock %}
{% block subheading %}Access your AMS Apartment portal.{% endblock %}

{% block content %}
<form method="POST" class="d-grid gap-3">
    {% csrf_token %}
    <input class="form-control" name="username" placeholder="Enter username">
    <input class="form-control" type="password" name="password" placeholder="Enter password">
    <button class="btn btn-brand">Resident / Staff Login</button>
    <div class="auth-linkline">Don't have an account? <a href="/register/">Register</a></div>
</form>
{% endblock %}
