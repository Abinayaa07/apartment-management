<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Authentication{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            color: #f8fafc;
            background:
                linear-gradient(rgba(46, 16, 101, 0.42), rgba(26, 10, 62, 0.62)),
                url("https://images.unsplash.com/photo-1460317442991-0ec209397118?auto=format&fit=crop&w=1600&q=80") center/cover no-repeat fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(circle, rgba(255,255,255,0.85) 1px, transparent 1.5px),
                radial-gradient(circle, rgba(255,255,255,0.55) 1px, transparent 1.5px);
            background-size: 34px 34px, 54px 54px;
            background-position: 0 0, 12px 12px;
            opacity: 0.28;
            pointer-events: none;
        }

        .auth-wrap {
            position: relative;
            z-index: 1;
            width: min(460px, 100%);
        }

        .brand-strip {
            text-align: center;
            margin-bottom: 1rem;
        }

        .brand-kicker {
            text-transform: uppercase;
            letter-spacing: 0.24em;
            font-size: 0.76rem;
            color: rgba(248, 250, 252, 0.76);
            margin-bottom: 0.45rem;
        }

        .brand-name {
            font-size: 1rem;
            color: rgba(248, 250, 252, 0.92);
        }

        .auth-card {
            padding: 2.35rem 2rem;
            border-radius: 1.6rem;
            background: linear-gradient(180deg, rgba(156, 72, 214, 0.38), rgba(74, 24, 141, 0.38));
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 24px 55px rgba(24, 10, 52, 0.34);
            backdrop-filter: blur(16px);
        }

        .auth-title {
            text-align: center;
            font-size: 2.25rem;
            font-weight: 700;
            margin-bottom: 0.45rem;
        }

        .auth-subtitle {
            text-align: center;
            color: rgba(248, 250, 252, 0.8);
            margin-bottom: 1.5rem;
        }

        .form-control,
        .form-select,
        textarea,
        input[type="text"],
        input[type="password"],
        input[type="email"],
        input[type="file"],
        select {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 999px;
            color: #fff;
            padding: 0.9rem 1rem;
            width: 100%;
        }

        textarea {
            min-height: 120px;
            border-radius: 1.2rem;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.68);
        }

        .form-select option,
        select option {
            color: #111827;
            background: #ffffff;
        }

        .form-control:focus,
        .form-select:focus {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 0 0.2rem rgba(255, 255, 255, 0.12);
        }

        .form-label,
        .helptext,
        .auth-meta,
        .auth-linkline {
            color: rgba(248, 250, 252, 0.82);
        }

        .helptext {
            font-size: 0.84rem;
        }

        .auth-card ul {
            color: rgba(248, 250, 252, 0.82);
            padding-left: 1.2rem;
        }

        .auth-card form p {
            margin-bottom: 1rem;
        }

        .auth-card form label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 600;
        }

        .auth-card form ul.errorlist {
            margin: 0 0 0.45rem;
            padding-left: 1rem;
            color: #fecaca;
            font-size: 0.88rem;
        }

        .btn-brand {
            width: 100%;
            border-radius: 999px;
            padding: 0.9rem 1rem;
            background: #ffffff;
            color: #1f2937;
            border: none;
            font-weight: 600;
        }

        .btn-brand:hover {
            background: #f3f4f6;
            color: #111827;
        }

        .alert {
            border-radius: 1rem;
            border: none;
        }

        .auth-linkline {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.94rem;
        }

        .auth-linkline a {
            color: #fff;
            font-weight: 700;
            text-decoration: none;
        }

        .auth-linkline a:hover {
            text-decoration: underline;
        }

        @media (max-width: 576px) {
            .auth-card {
                padding: 1.8rem 1.2rem;
            }
        }
    </style>
</head>
<body>
<div class="auth-wrap">
    <div class="brand-strip">
        <div class="brand-kicker">AMS Apartment</div>
        <div class="brand-name">{% block brand_title %}Community Access{% endblock %}</div>
    </div>

    <section class="auth-card">
        <div class="auth-title">{% block heading %}Login{% endblock %}</div>
        <div class="auth-subtitle">{% block subheading %}Use your account to continue.{% endblock %}</div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags|default:'info' }}" role="alert">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </section>
</div>
</body>
</html>
