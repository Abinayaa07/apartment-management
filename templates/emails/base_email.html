<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ subject }}</title>
</head>
<body style="margin:0; padding:0; background:#f3efe6; font-family:Arial, sans-serif; color:#1f2937;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f3efe6; padding:24px 12px;">
        <tr>
            <td align="center">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:640px; background:#fffdf8; border:1px solid #e3dac9; border-radius:20px; overflow:hidden;">
                    <tr>
                        <td style="background:linear-gradient(135deg, #1f2937 0%, #0f766e 100%); padding:24px 28px; color:#ffffff;">
                            <div style="font-size:12px; letter-spacing:0.22em; text-transform:uppercase; opacity:0.75;">AMS Apartment</div>
                            <div style="margin-top:10px; font-size:28px; font-weight:700;">{{ header_title }}</div>
                            <div style="margin-top:8px; font-size:15px; line-height:1.6; opacity:0.88;">{{ header_copy }}</div>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:28px;">
                            {% block body %}{% endblock %}
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:22px 28px; background:#f8f4ec; border-top:1px solid #e3dac9; color:#6b7280; font-size:13px; line-height:1.6;">
                            AMS Apartment Team<br>
                            This is an automated service email from your apartment management portal.
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
